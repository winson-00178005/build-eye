name: Build-Eye PR Pipeline Monitoring

on:
  schedule:
    - cron: '0 4,10,16,22 * * *'
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: '检查过去多少小时的构建记录'
        required: false
        default: '24'
        type: string
      dry_run:
        description: '试运行模式（不提交报告到归档仓库）'
        required: false
        default: 'false'
        type: boolean
      target_repo:
        description: '目标仓库（owner/repo格式）'
        required: false
        default: 'vllm-project/vllm-ascend'
        type: string

concurrency:
  group: monitor-pr
  cancel-in-progress: false

env:
  TARGET_REPO_OWNER: vllm-project
  TARGET_REPO_NAME: vllm-ascend
  PYTHON_VERSION: '3.11'
  PIPELINE_TYPE: pr

jobs:
  monitor-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      pull-requests: read
    
    steps:
      - name: Checkout build-eye repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Configure monitoring parameters
        env:
          LOOKBACK_HOURS: ${{ inputs.lookback_hours || '24' }}
          TARGET_REPO: ${{ inputs.target_repo || 'vllm-project/vllm-ascend' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          python scripts/monitor/configure.py \
            --lookback $LOOKBACK_HOURS \
            --target $TARGET_REPO \
            --dry-run $DRY_RUN \
            --pipeline-type pr
      
      - name: Fetch PR-type workflow runs (all status)
        env:
          GITHUB_TOKEN: ${{ secrets.VLLM_ASCEND_TOKEN || github.token }}
        run: |
          python scripts/monitor/fetch_runs.py \
            --output data/pr_workflow_runs.json \
            --pipeline-type pr \
            --status all \
            --timeout 30
      
      - name: Collect build metadata
        if: ${{ hashFiles('data/pr_workflow_runs.json') != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.VLLM_ASCEND_TOKEN || github.token }}
        run: |
          python scripts/monitor/collect_metadata.py \
            --input data/pr_workflow_runs.json \
            --output data/pr_metadata.json \
            --max-runs 20 \
            --timeout 30
      
      - name: Classify failure root causes
        if: ${{ hashFiles('data/pr_metadata.json') != '' }}
        run: |
          python scripts/classify/classifier.py \
            --input data/pr_metadata.json \
            --output data/pr_classifications.json
      
      - name: Generate fix recommendations
        if: ${{ hashFiles('data/pr_classifications.json') != '' }}
        run: |
          python scripts/recommend/recommender.py \
            --input data/pr_classifications.json \
            --output data/pr_recommendations.json
      
      - name: Generate PR monitoring reports
        if: ${{ hashFiles('data/pr_recommendations.json') != '' }}
        run: |
          python scripts/report/generator.py \
            --input data/pr_recommendations.json \
            --output reports/ \
            --pipeline-type pr
      
      - name: Aggregate build metrics
        if: ${{ always() }}
        run: |
          python scripts/monitor/aggregator_cli.py \
            --metadata data/pr_metadata.json \
            --classifications data/pr_classifications.json \
            --db data/build_metrics.db \
            --pipeline-type pr || true
      
      - name: Archive PR reports to build-eye repository
        if: ${{ inputs.dry_run != 'true' && hashFiles('data/pr_recommendations.json') != '' }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.VLLM_ASCEND_TOKEN || github.token }}
        run: |
          python scripts/archive/archiver.py \
            --input reports/ \
            --repo winson-00178005/build-eye \
            --pipeline-type pr
      
      - name: Persist monitoring data to repo
        if: ${{ always() }}
        run: |
          git config user.name "build-eye-monitor"
          git config user.email "build-eye-monitor@users.noreply.github.com"
          git add -f data/pr_metadata.json || true
          git add -f data/pr_classifications.json || true
          git add -f data/build_metrics.db || true
          git add -A data/ || true
          git diff --staged --quiet || git commit -m "Update PR monitoring data [skip ci]"
          git stash -u || true
          git pull --rebase --strategy-option ours || git rebase --abort || true
          git stash pop || true
          git push --force-with-lease || true
      
      - name: Upload reports artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pr-monitoring-reports
          path: reports/
          retention-days: 30
      
      - name: Summary
        if: ${{ always() }}
        run: |
          echo "## PR 流水线监测报告摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "流水线类型: PR" >> $GITHUB_STEP_SUMMARY
          echo "检查时间范围: ${{ inputs.lookback_hours || '24' }} 小时" >> $GITHUB_STEP_SUMMARY
          echo "目标仓库: ${{ inputs.target_repo || 'vllm-project/vllm-ascend' }}" >> $GITHUB_STEP_SUMMARY