name: Build-Eye PR Pipeline Monitoring

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: '检查过去多少小时的构建记录'
        required: false
        default: '24'
        type: string
      dry_run:
        description: '试运行模式（不提交报告到归档仓库）'
        required: false
        default: 'false'
        type: boolean
      target_repo:
        description: '目标仓库（owner/repo格式）'
        required: false
        default: 'vllm-project/vllm-ascend'
        type: string

env:
  TARGET_REPO_OWNER: vllm-project
  TARGET_REPO_NAME: vllm-ascend
  ARCHIVE_REPO_URL: https://github.com/winson-00178005/build-eye.git
  PYTHON_VERSION: '3.11'
  PIPELINE_TYPE: pr

jobs:
  monitor-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      pull-requests: read
    
    steps:
      - name: Checkout build-eye repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Configure monitoring parameters
        env:
          LOOKBACK_HOURS: ${{ inputs.lookback_hours || '24' }}
          TARGET_REPO: ${{ inputs.target_repo || 'vllm-project/vllm-ascend' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          python scripts/monitor/configure.py \
            --lookback $LOOKBACK_HOURS \
            --target $TARGET_REPO \
            --dry-run $DRY_RUN \
            --pipeline-type pr
      
      - name: Fetch PR-type failed workflow runs
        env:
          GITHUB_TOKEN: ${{ secrets.VLLM_ASCEND_TOKEN || github.token }}
        run: |
          python scripts/monitor/fetch_runs.py \
            --output data/workflow_runs.json \
            --pipeline-type pr \
            --status failure \
            --timeout 30
      
      - name: Collect build metadata
        if: ${{ hashFiles('data/workflow_runs.json') != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.VLLM_ASCEND_TOKEN || github.token }}
        run: |
          python scripts/monitor/collect_metadata.py \
            --input data/workflow_runs.json \
            --output data/build_metadata.json \
            --max-runs 20 \
            --timeout 30
      
      - name: Classify failure root causes
        if: ${{ hashFiles('data/build_metadata.json') != '' }}
        run: |
          python scripts/classify/classifier.py \
            --input data/build_metadata.json \
            --output data/classifications.json
      
      - name: Generate fix recommendations
        if: ${{ hashFiles('data/classifications.json') != '' }}
        run: |
          python scripts/recommend/recommender.py \
            --input data/classifications.json \
            --output data/recommendations.json
      
      - name: Generate PR monitoring reports
        if: ${{ hashFiles('data/recommendations.json') != '' }}
        run: |
          python scripts/report/generator.py \
            --input data/recommendations.json \
            --output reports/ \
            --pipeline-type pr
      
      - name: Archive PR reports to build-eye repository
        if: ${{ inputs.dry_run != 'true' && hashFiles('data/recommendations.json') != '' }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.VLLM_ASCEND_TOKEN || github.token }}
        run: |
          python scripts/archive/archiver.py \
            --input reports/ \
            --repo winson-00178005/build-eye \
            --pipeline-type pr
      
      - name: Upload reports artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pr-monitoring-reports
          path: reports/
          retention-days: 30
      
      - name: Summary
        if: ${{ always() }}
        run: |
          echo "## PR 流水线监测报告摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "流水线类型: PR" >> $GITHUB_STEP_SUMMARY
          echo "检查时间范围: ${{ inputs.lookback_hours || '6' }} 小时" >> $GITHUB_STEP_SUMMARY
          echo "目标仓库: ${{ inputs.target_repo || 'vllm-project/vllm-ascend' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/summary.json ]; then
            python scripts/report/summary.py --input data/summary.json >> $GITHUB_STEP_SUMMARY || true
          fi