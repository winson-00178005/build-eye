name: Test Notification

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send test notification
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_RECEIVE_IDS: ${{ secrets.FEISHU_RECEIVE_IDS }}
          DINGTALK_APP_KEY: ${{ secrets.DINGTALK_APP_KEY }}
          DINGTALK_APP_SECRET: ${{ secrets.DINGTALK_APP_SECRET }}
          DINGTALK_AGENT_ID: ${{ secrets.DINGTALK_AGENT_ID }}
          DINGTALK_RECEIVE_IDS: ${{ secrets.DINGTALK_RECEIVE_IDS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_SSL: ${{ secrets.SMTP_SSL }}
        run: |
          python scripts/notify/notifier_cli.py \
            --title "Build-Eye Test Notification" \
            --content "This is a test notification from Build-Eye CI Monitor. If you received this, the notification channel is working correctly." \
            --dry-run

          python scripts/notify/notifier_cli.py \
            --title "Build-Eye Test Notification" \
            --content "This is a test notification from Build-Eye CI Monitor. If you received this, the notification channel is working correctly."