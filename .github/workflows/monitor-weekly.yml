name: Build-Eye Weekly Pipeline Monitoring

on:
  schedule:
    - cron: '0 19 * * 0'
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: '检查过去多少小时的构建记录'
        required: false
        default: '168'
        type: string
      dry_run:
        description: '试运行模式'
        required: false
        default: 'false'
        type: boolean
      target_repo:
        description: '目标仓库（owner/repo格式）'
        required: false
        default: 'vllm-project/vllm-ascend'
        type: string

env:
  TARGET_REPO_OWNER: vllm-project
  TARGET_REPO_NAME: vllm-ascend
  ARCHIVE_REPO_URL: https://github.com/winson-00178005/build-eye.git
  PYTHON_VERSION: '3.11'
  PIPELINE_TYPE: weekly

jobs:
  monitor-weekly:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      pull-requests: read
    
    steps:
      - name: Checkout build-eye repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Configure monitoring parameters
        env:
          LOOKBACK_HOURS: ${{ inputs.lookback_hours || '168' }}
          TARGET_REPO: ${{ inputs.target_repo || 'vllm-project/vllm-ascend' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          python scripts/monitor/configure.py \
            --lookback $LOOKBACK_HOURS \
            --target $TARGET_REPO \
            --dry-run $DRY_RUN \
            --pipeline-type weekly
      
      - name: Fetch Weekly workflow runs (all status)
        env:
          GITHUB_TOKEN: ${{ secrets.VLLM_ASCEND_TOKEN || github.token }}
        run: |
          python scripts/monitor/fetch_runs.py \
            --output data/workflow_runs.json \
            --pipeline-type weekly \
            --status all \
            --branch main \
            --event schedule \
            --timeout 30
      
      - name: Collect build metadata
        if: ${{ hashFiles('data/workflow_runs.json') != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.VLLM_ASCEND_TOKEN || github.token }}
        run: |
          python scripts/monitor/collect_metadata.py \
            --input data/workflow_runs.json \
            --output data/build_metadata.json \
            --max-runs 50 \
            --timeout 30
      
      - name: Classify failure root causes
        if: ${{ hashFiles('data/build_metadata.json') != '' }}
        run: |
          python scripts/classify/classifier.py \
            --input data/build_metadata.json \
            --output data/classifications.json
      
      - name: Generate fix recommendations
        if: ${{ hashFiles('data/classifications.json') != '' }}
        run: |
          python scripts/recommend/recommender.py \
            --input data/classifications.json \
            --output data/recommendations.json
      
      - name: Generate Weekly summary report + Dashboard data
        if: ${{ hashFiles('data/recommendations.json') != '' }}
        run: |
          python scripts/report/generator.py \
            --input data/recommendations.json \
            --output reports/ \
            --pipeline-type weekly
      
      - name: Aggregate build metrics (weekly)
        if: ${{ always() }}
        run: |
          python scripts/monitor/aggregator_cli.py \
            --metadata data/build_metadata.json \
            --classifications data/classifications.json \
            --db data/build_metrics.db || true

      - name: Generate monitoring summary JSON
        if: ${{ always() }}
        run: |
          python -c "
          import json, sys
          from pathlib import Path
          sys.path.insert(0, 'scripts')
          from monitor.aggregator import BuildAggregator
          from report.dashboard import DashboardService

          db_path = Path('data/build_metrics.db')
          summary = {'timestamp': '', 'pipeline_type': 'weekly', 'runs': 0, 'summary': {}}

          if db_path.exists() and db_path.stat().st_size > 0:
              agg = BuildAggregator(str(db_path))
              svc = DashboardService(agg)
              overview = svc.generate_overview()
              categories = svc.generate_categories()
              health = svc.generate_health_scores()
              summary = {
                  'timestamp': overview.get('timestamp', ''),
                  'pipeline_type': 'weekly',
                  'runs': overview.get('summary', {}).get('total_runs', 0),
                  'summary': overview.get('summary', {}),
                  'pipelines': overview.get('pipelines', {}),
                  'categories': categories.get('distribution', {}),
                  'health_scores': health.get('scores', {})
              }
              agg.close()

          Path('data/monitoring_summary.json').write_text(
              json.dumps(summary, indent=2, ensure_ascii=False), encoding='utf-8')
          print(f'Summary: {summary.get(\"runs\", 0)} runs')
          " || true

      - name: Persist monitoring data to repo
        if: ${{ always() }}
        run: |
          git config user.name "build-eye-monitor"
          git config user.email "build-eye-monitor@users.noreply.github.com"
          git add -f data/monitoring_summary.json || true
          git add -f data/build_metadata.json || true
          git add -f data/classifications.json || true
          git diff --staged --quiet || git commit -m "Update Weekly monitoring data [skip ci]"
          git pull --rebase || true
          git push || true
      
      - name: Archive Weekly report to build-eye repository
        if: ${{ inputs.dry_run != 'true' && hashFiles('data/recommendations.json') != '' }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.VLLM_ASCEND_TOKEN || github.token }}
        run: |
          python scripts/archive/archiver.py \
            --input reports/ \
            --repo winson-00178005/build-eye \
            --pipeline-type weekly
      
      - name: Send notification
        if: ${{ always() }}
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SIGN_SECRET: ${{ secrets.FEISHU_SIGN_SECRET }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          DINGTALK_SIGN_SECRET: ${{ secrets.DINGTALK_SIGN_SECRET }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_SSL: ${{ secrets.SMTP_SSL }}
        run: |
          python scripts/notify/notifier_cli.py \
            --report-type Weekly \
            --summary dashboard/dashboard_data.json \
            --report-url "https://github.com/winson-00178005/build-eye/blob/main/reports/$(date +%Y/%m/%d)/weekly/report.md" || true
      
      - name: Upload reports artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: weekly-monitoring-reports
          path: reports/
          retention-days: 30
      
      - name: Summary
        if: ${{ always() }}
        run: |
          echo "## Weekly 流水线周报摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "流水线类型: Weekly" >> $GITHUB_STEP_SUMMARY
          echo "检查时间范围: ${{ inputs.lookback_hours || '168' }} 小时 (7天)" >> $GITHUB_STEP_SUMMARY
          echo "目标仓库: ${{ inputs.target_repo || 'vllm-project/vllm-ascend' }}" >> $GITHUB_STEP_SUMMARY