name: Build-Eye Weekly Pipeline Monitoring

on:
  schedule:
    - cron: '0 19 * * 0'
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: '检查过去多少小时的构建记录'
        required: false
        default: '168'
        type: string
      dry_run:
        description: '试运行模式'
        required: false
        default: 'false'
        type: boolean
      target_repo:
        description: '目标仓库（owner/repo格式）'
        required: false
        default: 'vllm-project/vllm-ascend'
        type: string

concurrency:
  group: monitor-weekly
  cancel-in-progress: false

env:
  TARGET_REPO_OWNER: vllm-project
  TARGET_REPO_NAME: vllm-ascend
  PYTHON_VERSION: '3.11'
  PIPELINE_TYPE: weekly

jobs:
  monitor-weekly:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      pull-requests: read
    
    steps:
      - name: Checkout build-eye repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Configure monitoring parameters
        env:
          LOOKBACK_HOURS: ${{ inputs.lookback_hours || '168' }}
          TARGET_REPO: ${{ inputs.target_repo || 'vllm-project/vllm-ascend' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          python scripts/monitor/configure.py \
            --lookback $LOOKBACK_HOURS \
            --target $TARGET_REPO \
            --dry-run $DRY_RUN \
            --pipeline-type weekly
      
      - name: Fetch Weekly workflow runs (all status)
        env:
          GITHUB_TOKEN: ${{ secrets.VLLM_ASCEND_TOKEN || github.token }}
        run: |
          python scripts/monitor/fetch_runs.py \
            --output data/weekly_workflow_runs.json \
            --pipeline-type weekly \
            --status all \
            --branch main \
            --event schedule \
            --timeout 30
      
      - name: Collect build metadata
        if: ${{ hashFiles('data/weekly_workflow_runs.json') != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.VLLM_ASCEND_TOKEN || github.token }}
        run: |
          python scripts/monitor/collect_metadata.py \
            --input data/weekly_workflow_runs.json \
            --output data/weekly_metadata.json \
            --max-runs 50 \
            --timeout 30
      
      - name: Classify failure root causes
        if: ${{ hashFiles('data/weekly_metadata.json') != '' }}
        run: |
          python scripts/classify/classifier.py \
            --input data/weekly_metadata.json \
            --output data/weekly_classifications.json
      
      - name: Generate fix recommendations
        if: ${{ hashFiles('data/weekly_classifications.json') != '' }}
        run: |
          python scripts/recommend/recommender.py \
            --input data/weekly_classifications.json \
            --output data/weekly_recommendations.json
      
      - name: Generate Weekly summary report
        if: ${{ hashFiles('data/weekly_recommendations.json') != '' }}
        run: |
          python scripts/report/generator.py \
            --input data/weekly_recommendations.json \
            --output reports/ \
            --pipeline-type weekly
      
      - name: Aggregate build metrics (weekly)
        if: ${{ always() }}
        run: |
          python scripts/monitor/aggregator_cli.py \
            --metadata data/weekly_metadata.json \
            --classifications data/weekly_classifications.json \
            --db data/build_metrics.db \
            --pipeline-type weekly || true
      
      - name: Archive Weekly report to build-eye repository
        if: ${{ inputs.dry_run != 'true' && hashFiles('data/weekly_recommendations.json') != '' }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.VLLM_ASCEND_TOKEN || github.token }}
        run: |
          python scripts/archive/archiver.py \
            --input reports/ \
            --repo winson-00178005/build-eye \
            --pipeline-type weekly
      
      - name: Persist monitoring data to repo
        if: ${{ always() }}
        run: |
          git config user.name "build-eye-monitor"
          git config user.email "build-eye-monitor@users.noreply.github.com"
          git add -f data/weekly_metadata.json || true
          git add -f data/weekly_classifications.json || true
          git add -f data/build_metrics.db || true
          git diff --staged --quiet || git commit -m "Update Weekly monitoring data [skip ci]"
          git pull --rebase --strategy-option ours || git rebase --abort || true
          git push --force-with-lease || true
      
      - name: Upload reports artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: weekly-monitoring-reports
          path: reports/
          retention-days: 30
      
      - name: Summary
        if: ${{ always() }}
        run: |
          echo "## Weekly 流水线周报摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "流水线类型: Weekly" >> $GITHUB_STEP_SUMMARY
          echo "检查时间范围: ${{ inputs.lookback_hours || '168' }} 小时 (7天)" >> $GITHUB_STEP_SUMMARY
          echo "目标仓库: ${{ inputs.target_repo || 'vllm-project/vllm-ascend' }}" >> $GITHUB_STEP_SUMMARY