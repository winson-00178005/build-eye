name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'reports/**'
      - 'dashboard/**'
  workflow_dispatch:
  schedule:
    - cron: '0 4,10,16,22 * * *'

concurrency:
  group: deploy-dashboard
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for monitor data availability
        id: check_data
        run: |
          has_data="false"
          for ptype in pr nightly weekly; do
            if [ -f "data/${ptype}_metadata.json" ]; then
              has_data="true"
              echo "${ptype}_metadata_exists=true" >> $GITHUB_OUTPUT
            fi
          done
          echo "has_monitor_data=${has_data}" >> $GITHUB_OUTPUT

      - name: 'Fallback: Fetch ALL workflow runs (if no monitor data exists)'
        if: ${{ steps.check_data.outputs.has_monitor_data == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.VLLM_ASCEND_TOKEN || github.token }}
        run: |
          python scripts/monitor/fetch_runs.py \
            --output data/workflow_runs_all.json \
            --pipeline-type all \
            --status all \
            --lookback 168 \
            --timeout 60 || true

      - name: 'Fallback: Collect build metadata'
        if: ${{ steps.check_data.outputs.has_monitor_data == 'false' && hashFiles('data/workflow_runs_all.json') != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.VLLM_ASCEND_TOKEN || github.token }}
        run: |
          python scripts/monitor/collect_metadata.py \
            --input data/workflow_runs_all.json \
            --output data/build_metadata.json \
            --max-runs 200 \
            --timeout 60 || true

      - name: 'Fallback: Classify failure root causes'
        if: ${{ steps.check_data.outputs.has_monitor_data == 'false' && hashFiles('data/build_metadata.json') != '' }}
        run: |
          python scripts/classify/classifier.py \
            --input data/build_metadata.json \
            --output data/classifications.json || true

      - name: 'Fallback: Aggregate build metrics'
        if: ${{ steps.check_data.outputs.has_monitor_data == 'false' && always() }}
        run: |
          python scripts/monitor/aggregator_cli.py \
            --metadata data/build_metadata.json \
            --classifications data/classifications.json \
            --db data/build_metrics.db || true

      - name: Generate rich dashboard data
        if: ${{ always() }}
        run: |
          python scripts/report/dashboard_data_generator.py

      - name: Persist dashboard data to repo
        if: ${{ always() }}
        run: |
          if [ -f dashboard/dashboard_data.json ]; then
            git config user.name "build-eye-dashboard"
            git config user.email "build-eye-dashboard@users.noreply.github.com"
            git add dashboard/dashboard_data.json || true
            git diff --staged --quiet || git commit -m "Update dashboard data [skip ci]"
            git push || true
          fi

      - name: Send notification for each pipeline type
        if: ${{ always() }}
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SIGN_SECRET: ${{ secrets.FEISHU_SIGN_SECRET }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          DINGTALK_SIGN_SECRET: ${{ secrets.DINGTALK_SIGN_SECRET }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_SSL: ${{ secrets.SMTP_SSL }}
        run: |
          for ptype in Nightly Weekly PR; do
            python scripts/notify/notifier_cli.py \
              --report-type "$ptype" \
              --summary dashboard/dashboard_data.json || true
          done

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          publish_branch: gh-pages
          cname: false