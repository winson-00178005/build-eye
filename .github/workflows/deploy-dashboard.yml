name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'reports/**'
      - 'data/**'
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write
  actions: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch ALL workflow runs from vllm-ascend (7-day lookback)
        env:
          GITHUB_TOKEN: ${{ secrets.VLLM_ASCEND_TOKEN || github.token }}
        run: |
          python scripts/monitor/fetch_runs.py \
            --output data/workflow_runs_all.json \
            --pipeline-type all \
            --status all \
            --lookback 168 \
            --timeout 60 || true

      - name: Collect build metadata
        if: ${{ hashFiles('data/workflow_runs_all.json') != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.VLLM_ASCEND_TOKEN || github.token }}
        run: |
          python scripts/monitor/collect_metadata.py \
            --input data/workflow_runs_all.json \
            --output data/build_metadata.json \
            --max-runs 200 \
            --timeout 60 || true

      - name: Classify failure root causes
        if: ${{ hashFiles('data/build_metadata.json') != '' }}
        run: |
          python scripts/classify/classifier.py \
            --input data/build_metadata.json \
            --output data/classifications.json || true

      - name: Aggregate build metrics into SQLite
        if: ${{ always() }}
        run: |
          python scripts/monitor/aggregator_cli.py \
            --metadata data/build_metadata.json \
            --classifications data/classifications.json \
            --db data/build_metrics.db || true

      - name: Generate rich dashboard data
        if: ${{ always() }}
        run: |
          python scripts/report/dashboard_data_generator.py

      - name: Persist dashboard data to repo
        if: ${{ always() }}
        run: |
          if [ -f dashboard/dashboard_data.json ]; then
            git config user.name "build-eye-dashboard"
            git config user.email "build-eye-dashboard@users.noreply.github.com"
            git add dashboard/dashboard_data.json || true
            git diff --staged --quiet || git commit -m "Update dashboard data [skip ci]"
            git push || true
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          publish_branch: gh-pages
          cname: false