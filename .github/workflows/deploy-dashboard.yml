name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'reports/**'
      - 'data/**'
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write
  actions: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch ALL workflow runs from vllm-ascend (7-day lookback)
        env:
          GITHUB_TOKEN: ${{ secrets.VLLM_ASCEND_TOKEN || github.token }}
        run: |
          python scripts/monitor/fetch_runs.py \
            --output data/workflow_runs_all.json \
            --pipeline-type all \
            --status all \
            --lookback 168 \
            --timeout 60 || true

      - name: Collect build metadata
        if: ${{ hashFiles('data/workflow_runs_all.json') != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.VLLM_ASCEND_TOKEN || github.token }}
        run: |
          python scripts/monitor/collect_metadata.py \
            --input data/workflow_runs_all.json \
            --output data/build_metadata.json \
            --max-runs 200 \
            --timeout 60 || true

      - name: Classify failure root causes
        if: ${{ hashFiles('data/build_metadata.json') != '' }}
        run: |
          python scripts/classify/classifier.py \
            --input data/build_metadata.json \
            --output data/classifications.json || true

      - name: Aggregate build metrics into SQLite
        if: ${{ always() }}
        run: |
          python scripts/monitor/aggregator_cli.py \
            --metadata data/build_metadata.json \
            --classifications data/classifications.json \
            --db data/build_metrics.db || true

      - name: Generate dashboard data from real monitoring data
        if: ${{ always() }}
        run: |
          python -c "
          import json, sys, os
          from pathlib import Path
          from datetime import datetime, timezone

          sys.path.insert(0, 'scripts')

          data = {
              'overview': {'timestamp': datetime.now(timezone.utc).isoformat(), 'summary': {}, 'pipelines': {}},
              'trends': {'pipelines': {}},
              'categories': {'distribution': {}},
              'recent_failures': {'failures': []},
              'health_scores': {'scores': {}}
          }

          db_path = Path('data/build_metrics.db')
          if db_path.exists() and db_path.stat().st_size > 0:
              from monitor.aggregator import BuildAggregator
              from report.dashboard import DashboardService
              agg = BuildAggregator(str(db_path))
              svc = DashboardService(agg)
              data = svc.generate_full_dashboard()
              agg.close()

          metadata_path = Path('data/build_metadata.json')
          if metadata_path.exists():
              metadata_list = json.loads(metadata_path.read_text(encoding='utf-8'))
              pipeline_groups = {}
              for m in metadata_list:
                  ptype = m.get('pipeline_info', {}).get('pipeline_type', 'pr')
                  if ptype not in pipeline_groups:
                      pipeline_groups[ptype] = {'total': 0, 'success': 0, 'failure': 0}
                  wf = m.get('workflow_run', {})
                  conclusion = wf.get('conclusion', '')
                  pipeline_groups[ptype]['total'] += 1
                  if conclusion == 'success':
                      pipeline_groups[ptype]['success'] += 1
                  else:
                      pipeline_groups[ptype]['failure'] += 1

              for ptype, pg in pipeline_groups.items():
                  rate = round((pg['success'] / max(pg['total'], 1)) * 100, 1)
                  data['overview']['pipelines'][ptype] = {
                      'total_runs': pg['total'],
                      'success_runs': pg['success'],
                      'failure_runs': pg['failure'],
                      'success_rate': rate
                  }

              total_all = sum(d['total'] for d in pipeline_groups.values())
              success_all = sum(d['success'] for d in pipeline_groups.values())
              data['overview']['summary'] = {
                  'total_runs': total_all,
                  'success_runs': success_all,
                  'failure_runs': total_all - success_all,
                  'overall_success_rate': round((success_all / max(total_all, 1)) * 100, 1)
              }

          classifications_path = Path('data/classifications.json')
          if classifications_path.exists():
              cls_list = json.loads(classifications_path.read_text(encoding='utf-8'))
              dist = {}
              for c in cls_list:
                  cls_data = c.get('classification', {})
                  cat = cls_data.get('classification', 'unknown')
                  dist[cat] = dist.get(cat, 0) + 1
              data['categories']['distribution'] = dist

              for c in cls_list:
                  cls_data = c.get('classification', {})
                  if cls_data.get('classification', '') != 'unknown':
                      wf = c.get('workflow_run_id')
                      data['recent_failures']['failures'].append({
                          'workflow_name': cls_data.get('workflow_name', ''),
                          'classification': cls_data.get('classification', ''),
                          'confidence': cls_data.get('confidence', 'low'),
                          'started_at': cls_data.get('started_at', ''),
                          'pipeline_type': cls_data.get('pipeline_type', 'pr')
                      })

          # health scores from pipeline stats
          for ptype, pg in data['overview']['pipelines'].items():
              rate = pg.get('success_rate', 0)
              if rate >= 80:
                  data['health_scores']['scores'][ptype] = {'score': round(rate * 0.4 + 80 * 0.3 + 70 * 0.3, 1), 'rating': '良好', 'emoji': '🟢', 'trend': 'stable'}
              elif rate >= 60:
                  data['health_scores']['scores'][ptype] = {'score': round(rate * 0.4 + 60 * 0.3 + 50 * 0.3, 1), 'rating': '一般', 'emoji': '🟡', 'trend': 'stable'}
              else:
                  data['health_scores']['scores'][ptype] = {'score': round(rate * 0.4 + 30 * 0.3 + 20 * 0.3, 1), 'rating': '危险', 'emoji': '🔴', 'trend': 'declining'}

          # scan committed reports for additional data
          reports_dir = Path('reports')
          if reports_dir.exists():
              for ymd_dir in sorted(reports_dir.iterdir(), reverse=True)[:5]:
                  if not ymd_dir.is_dir(): continue
                  for type_dir in ['pr', 'nightly', 'weekly']:
                      td = ymd_dir / type_dir
                      if td.exists():
                          for report_file in td.rglob('report.md'):
                              frontmatter = {}
                              content = report_file.read_text(encoding='utf-8')
                              if content.startswith('---'):
                                  end = content.find('---', 3)
                                  if end > 0:
                                      fm_text = content[3:end]
                                      for line in fm_text.strip().split('\n'):
                                          if ':' in line:
                                              k, v = line.split(':', 1)
                                              frontmatter[k.strip()] = v.strip()
                              classification = frontmatter.get('overall_classification', '')
                              if classification:
                                  data['recent_failures']['failures'].append({
                                      'workflow_name': frontmatter.get('workflow_name', classification),
                                      'classification': classification,
                                      'confidence': 'high',
                                      'started_at': frontmatter.get('generated_at', ''),
                                      'pipeline_type': type_dir
                                  })

          Path('dashboard/dashboard_data.json').write_text(
              json.dumps(data, indent=2, ensure_ascii=False), encoding='utf-8')
          print('Dashboard data generated successfully')
          print(f'Overview: {json.dumps(data.get(\"overview\", {}).get(\"summary\", {}), indent=2)}')
          print(f'Pipelines: {list(data.get(\"overview\", {}).get(\"pipelines\", {}).keys())}')
          print(f'Categories: {data.get(\"categories\", {}).get(\"distribution\", {})}')
          print(f'Failures count: {len(data.get(\"recent_failures\", {}).get(\"failures\", []))}')
          "

      - name: Persist dashboard data to repo
        if: ${{ always() }}
        run: |
          if [ -f dashboard/dashboard_data.json ]; then
            git config user.name "build-eye-dashboard"
            git config user.email "build-eye-dashboard@users.noreply.github.com"
            git add dashboard/dashboard_data.json || true
            git diff --staged --quiet || git commit -m "Update dashboard data [skip ci]"
            git push || true
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          publish_branch: gh-pages
          cname: false